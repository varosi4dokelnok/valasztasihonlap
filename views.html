<h2>Oldalmegtekintések valós időben</h2>
<div id="counter" style="font-size: 24px; font-weight: bold;">Betöltés...</div>

<script>
// Ez a függvény lekéri a legfrissebb nézettséget
function frissit() {
  fetch("https://hits.sh/varosi-kampany26.hu.json")
    .then(r => r.json())
    .then(d => {
      document.getElementById("counter").innerText =
        "Megtekintések: " + d.hits;
    })
    .catch(err => {
      document.getElementById("counter").innerText =
        "Hiba történt: " + err;
    });
}

// Azonnal lefut egyszer
frissit();

// Majd 2 másodpercenként újra
setInterval(frissit, 2000);
</script>
